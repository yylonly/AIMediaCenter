services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: aimediacenter
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/config/aimediacenter.db
      - JWT_SECRET=${JWT_SECRET:-change-me-please-a-long-random-string}
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      - SUPERUSER=${SUPERUSER:-admin}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:-admin}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - QB_URL=${QB_URL:-http://qbittorrent:8080}
      - QB_USERNAME=${QB_USERNAME:-admin}
      - QB_PASSWORD=${QB_PASSWORD:-adminadmin}
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - DOWNLOAD_DIR=/downloads
      - LIBRARY_DIR_MOVIE=/media/movies
      - LIBRARY_DIR_TV=/media/tv
      - TRANSFER_TYPE=link
    volumes:
      - ./config:/config
      - ./downloads:/downloads
      - ./media/movies:/media/movies
      - ./media/tv:/media/tv
    depends_on:
      - jellyfin
      - qbittorrent
    networks:
      - aimedia

  # ---------- 媒体服务器 ----------
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - '8096:8096'      # Web UI
      - '7359:7359/udp'  # 局域网自动发现（可选）
    volumes:
      - ./jellyfin/config:/config      # Jellyfin 自身配置
      - ./jellyfin/cache:/cache        # 转码/图片缓存
      - ./media/movies:/media/movies:ro # 只读挂载媒体库
      - ./media/tv:/media/tv:ro
    networks:
      - aimedia

  # ---------- 下载器 ----------
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - WEBUI_PORT=8080
    ports:
      - '8080:8080'      # Web UI
      - '6881:6881'
      - '6881:6881/udp' # BT 传输端口
    volumes:
      - ./qbittorrent/config:/config
      - ./downloads:/downloads   # 与 app 同一宿主目录，保证 hardlink 可用
    networks:
      - aimedia

networks:
  aimedia:
    driver: bridge
