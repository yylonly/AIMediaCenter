# Production deployment compose for NAS (pulls prebuilt image from GHCR).
# Place this file at /volume1/docker/aimediacenter/docker-compose.yml on the NAS
# and keep a sibling .env file with your secrets next to it.

services:
  app:
    image: ghcr.io/yylonly/aimediacenter:latest
    container_name: aimediacenter
    restart: unless-stopped
    pull_policy: always
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/config/aimediacenter.db
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      - SUPERUSER=${SUPERUSER:-admin}
      - SUPERUSER_PASSWORD=${SUPERUSER_PASSWORD:?SUPERUSER_PASSWORD must be set in .env}
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - QB_URL=${QB_URL:-http://qbittorrent:8080}
      - QB_USERNAME=${QB_USERNAME:-admin}
      - QB_PASSWORD=${QB_PASSWORD:-adminadmin}
      - QB_CATEGORY_MOVIE=${QB_CATEGORY_MOVIE:-movies}
      - QB_CATEGORY_TV=${QB_CATEGORY_TV:-tv}
      - JELLYFIN_URL=${JELLYFIN_URL:-http://jellyfin:8096}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - DOWNLOAD_DIR=${CONTAINER_DOWNLOAD_ROOT:-/downloads}
      - LIBRARY_DIR_MOVIE=${CONTAINER_MEDIA_ROOT:-/media}/movies
      - LIBRARY_DIR_TV=${CONTAINER_MEDIA_ROOT:-/media}/tv
      # Roots currently in effect, passed through so the app can tell the
      # settings UI whether edited roots need a container rebuild.
      - HOST_MEDIA_ROOT=${HOST_MEDIA_ROOT:-/volume1/media}
      - HOST_DOWNLOAD_ROOT=${HOST_DOWNLOAD_ROOT:-/volume1/downloads}
      - CONTAINER_MEDIA_ROOT=${CONTAINER_MEDIA_ROOT:-/media}
      - CONTAINER_DOWNLOAD_ROOT=${CONTAINER_DOWNLOAD_ROOT:-/downloads}
      - TRANSFER_TYPE=${TRANSFER_TYPE:-link}
      - MOVIE_RENAME_FORMAT=${MOVIE_RENAME_FORMAT:-{{title}} ({{year}})/{{title}} ({{year}}){{ ' - ' + resourcePix if resourcePix }}{{fileExt}}}
      - TV_RENAME_FORMAT=${TV_RENAME_FORMAT:-{{title}} ({{year}})/Season {{season}}/{{title}} - S{{season | pad2}}E{{episode | pad2}}{{fileExt}}}
      - CRON_SUBSCRIBE_SEARCH=${CRON_SUBSCRIBE_SEARCH:-0 */8 * * *}
      - CRON_SUBSCRIBE_REFRESH=${CRON_SUBSCRIBE_REFRESH:-*/30 * * * *}
      - CRON_TRANSFER_POLL=${CRON_TRANSFER_POLL:-* * * * *}
      - CRON_MEDIASERVER_SYNC=${CRON_MEDIASERVER_SYNC:-0 3 * * *}
    volumes:
      - /volume1/docker/aimediacenter/config:/config
      # Single-root mounts: category subdirs live under these roots, so new
      # rules never require mount changes. Roots are .env-driven; the in-app
      # "rebuild container" flow rewrites them in .env and recreates.
      - ${HOST_DOWNLOAD_ROOT:-/volume1/downloads}:${CONTAINER_DOWNLOAD_ROOT:-/downloads}
      - ${HOST_MEDIA_ROOT:-/volume1/media}:${CONTAINER_MEDIA_ROOT:-/media}
